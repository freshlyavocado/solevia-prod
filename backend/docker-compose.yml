services:
  # Laravel Backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solevia-backend
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_NAME: Solevia
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: solevia
      DB_USERNAME: solevia_user
      DB_PASSWORD: secret_password
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      SANCTUM_STATEFUL_DOMAINS: "localhost:5173,localhost:3000"
      FRONTEND_URL: "http://localhost:5173"
    volumes:
      - storage_data:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: solevia-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: solevia
      MYSQL_USER: solevia_user
      MYSQL_PASSWORD: secret_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  storage_data:
