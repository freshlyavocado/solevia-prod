# ============================================
# Solevia Full Stack — Backend + Frontend + DB
# ============================================

services:
  # -------- MySQL Database --------
  db:
    image: mysql:8.0
    container_name: solevia-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: solevia
      MYSQL_USER: db_admin
      MYSQL_PASSWORD: 12345
      MYSQL_ROOT_PASSWORD: 12345
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------- Laravel Backend --------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solevia-backend
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_NAME: Solevia
      APP_ENV: production
      APP_DEBUG: "true"
      APP_URL: http://192.168.100.48:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: solevia
      DB_USERNAME: db_admin
      DB_PASSWORD: 12345
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      SANCTUM_STATEFUL_DOMAINS: "localhost,localhost:5173,192.168.100.48,192.168.100.48:5173"
      FRONTEND_URL: "http://192.168.100.48:5173"
    volumes:
      - storage_data:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy

  # -------- Vue Frontend --------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://192.168.100.48:8000/api
    container_name: solevia-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
  storage_data:
